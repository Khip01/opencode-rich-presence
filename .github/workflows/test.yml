name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke (${{ matrix.os }} / Node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Syntax check (all JS/MJS files)
        run: node scripts/syntax-check.js

      - name: Help output
        run: node bin/rich-presence.js help

      - name: Version output
        run: node bin/rich-presence.js version

      - name: Info output (dry)
        run: node bin/rich-presence.js info

      - name: Pack dry run
        run: npm pack --dry-run
