name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger from the Actions tab for one-off runs.
  workflow_dispatch:

# Cancel in-progress runs when a new commit lands on the same
# branch. Without this, fast pushes to the same PR queue up
# redundant jobs that each install npm and run the full suite.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }} / Node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        # Cover the full range declared in `engines.node`. LTS lines
        # (20, 22) plus the current latest (24). Ubuntu-only because
        # the daemon uses Unix domain sockets and Windows requires
        # a separate named-pipe path that we do not test in CI today.
        os: [ubuntu-latest]
        node: [20, 22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: npm run syntax

      - name: Smoke (help / version / info / pack dry-run)
        run: |
          node bin/opencode-rpc.js help
          node bin/opencode-rpc.js version
          node bin/opencode-rpc.js info
          npm pack --dry-run

      # Full regression suite. The four harnesses are independent
      # (each spins up its own daemon on its own temp socket) so we
      # can run them sequentially. Total wall time ~3 min on
      # ubuntu-latest; the matrix above multiplies that across
      # Node versions.
      - name: Phase 1 harness
        run: npm run test:phase1

      - name: Phase 2 harness
        run: npm run test:phase2

      - name: Phase 2 v2 harness
        run: npm run test:phase2-v2

      # CLI lifecycle (commit-time portion only): CLI output, arg
      # validation, install.sh unit checks, end-to-end install in
      # sandbox. The "update flow" scenario is in tests/release-smoke
      # and runs only in the release workflow.
      - name: CLI lifecycle harness
        run: npm run test:cli-lifecycle
