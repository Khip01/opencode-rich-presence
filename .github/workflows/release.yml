name: Release

on:
  push:
    tags:
      - "v*"
      # Also accept semantic-version tags without the "v" prefix
      # (e.g. "3.1.4-phase2") so we can publish the redesign branch's
      # pre-release line. The filter below rejects unstable suffixes.
      - "[0-9]*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build & publish GitHub release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Run test suite
        # Fail the release if any harness fails. Catch-and-show with
        # `|| true` would hide regressions; we want a hard fail.
        run: npm test

      - name: Smoke (help / version)
        run: |
          node bin/opencode-rpc.js help
          node bin/opencode-rpc.js version

      - name: Build tarball
        run: |
          npm pack
          # Rename to include the tag name so multiple releases can
          # coexist as release assets (e.g.
          # opencode-rich-presence-v3.1.4-phase2.tgz).
          mv opencode-rich-presence-*.tgz opencode-rich-presence-${{ github.ref_name }}.tgz

      - name: Publish to npm registry (optional)
        # Only runs if the NPM_TOKEN secret is configured on the
        # repo. The publish step uses `npm publish --provenance`
        # which links the published artifact back to this workflow
        # run. Skip with an explicit message if the secret is missing
        # so users running their own forks see what would happen.
        if: env.NPM_TOKEN_CHECK != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN_CHECK: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Publishing to npm registry..."
          npm publish --provenance --access public

      - name: Publish to npm registry (skipped)
        if: env.NPM_TOKEN_CHECK == ''
        env:
          NPM_TOKEN_CHECK: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "NPM_TOKEN secret not set; skipping npm publish."
          echo "Set the NPM_TOKEN secret in repo settings to enable auto-publish."

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: opencode-rich-presence-*.tgz
          body: |
            ## Installation

            ### Stable (recommended for end users)

            ```bash
            # Easiest path: use the CLI's built-in installer. It
            # handles git ref syntax, works around npm v11's broken
            # git-dep symlinks, and supports version pinning.
            opencode-rpc update --ref ${{ github.ref_name }}
            opencode-rpc install

            # Or install via npm directly (zsh users: wrap in single quotes):
            npm install -g 'Khip01/opencode-rich-presence#${{ github.ref_name }}'
            opencode-rpc install
            ```

            ### Install from a specific branch (e.g. redesign/v3-daemon)

            ```bash
            # DO NOT use 'npm install -g <url>#<branch>' for branches.
            # npm v11 has a bug that creates a partial install without
            # the opencode-rpc symlink. Use the CLI instead:
            opencode-rpc update --ref redesign/v3-daemon
            opencode-rpc install

            # Track a branch for ongoing dev installs:
            opencode-rpc update --dev redesign/v3-daemon
            opencode-rpc install
            ```

            ### Update

            ```bash
            opencode-rpc update                  # latest stable release tag
            opencode-rpc update --stable         # force install latest stable
            opencode-rpc update --dev <branch>   # latest commit on <branch>
            opencode-rpc update --ref <ref>      # specific ref (tag, branch, or SHA)
            opencode-rpc update --repo <fork>    # install from a fork
            ```

            ## What's in ${{ github.ref_name }}

            See [CHANGELOG.md](https://github.com/Khip01/opencode-rich-presence/blob/main/CHANGELOG.md) for full details.
