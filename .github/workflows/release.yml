name: Release

on:
  push:
    tags:
      - "v*"
      # Also accept semantic-version tags without the "v" prefix
      # (e.g. "3.1.5") for users who prefer that convention.
      # The filter below rejects unstable suffixes (-rc, -beta, -alpha).
      - "[0-9]*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build & publish GitHub release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Run test suite
        # Commit-time tests: plugin logic + CLI source + install.sh
        # unit checks + install in sandbox (npm pack fallback).
        # Uses npm test, which runs phase1+2+2-v2+cli-lifecycle.
        # Fails the release if any harness fails. Catch-and-show with
        # `|| true` would hide regressions; we want a hard fail.
        run: npm test

      - name: Smoke (help / version)
        run: |
          node bin/opencode-rpc.js help
          node bin/opencode-rpc.js version

      - name: Build tarball
        run: |
          npm pack
          # Rename to include the tag name so multiple releases can
          # coexist as release assets (e.g.
          # opencode-rich-presence-v3.1.4-phase2.tgz).
          mv opencode-rich-presence-*.tgz opencode-rich-presence-${{ github.ref_name }}.tgz

      - name: Pre-release gate
        # Verifies the just-built tarball (output of `npm pack` above)
        # installs cleanly in an isolated npm prefix. Gating: failures
        # here cause the workflow to exit non-zero BEFORE the GitHub
        # release is published, so a broken tarball never reaches the
        # release page.
        #
        # Uses the LOCAL tarball (no curl to GitHub) so this workflow
        # does not depend on a previous release being published.
        # Full user simulation with the REAL published tarball
        # (including upgrade from previous release, update --stable,
        # update --dev) is handled by the post-release workflow,
        # which runs AFTER publish and can safely curl.
        run: npm run test:pre-release -- --tarball=opencode-rich-presence-${{ github.ref_name }}.tgz

      - name: Publish to npm registry (optional)
        # Only runs if the NPM_TOKEN secret is configured on the
        # repo. The publish step uses `npm publish --provenance`
        # which links the published artifact back to this workflow
        # run. Skip with an explicit message if the secret is missing
        # so users running their own forks see what would happen.
        if: env.NPM_TOKEN_CHECK != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN_CHECK: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Publishing to npm registry..."
          npm publish --provenance --access public

      - name: Publish to npm registry (skipped)
        if: env.NPM_TOKEN_CHECK == ''
        env:
          NPM_TOKEN_CHECK: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "NPM_TOKEN secret not set; skipping npm publish."
          echo "Set the NPM_TOKEN secret in repo settings to enable auto-publish."

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: opencode-rich-presence-*.tgz
          body: |
            ## Installation

            ### Stable (recommended for end users)

            ```bash
            # Easiest path: one-liner curl installer. Works on
            # Linux, macOS, and Windows (Git Bash / MSYS2 / Cygwin / WSL).
            curl -fsSL https://raw.githubusercontent.com/Khip01/opencode-rich-presence/main/install.sh | bash
            ```

            Pin to a specific version:

            ```bash
            curl -fsSL https://raw.githubusercontent.com/Khip01/opencode-rich-presence/main/install.sh \
              | ORP_VERSION=${{ github.ref_name }} bash
            ```

            ### Manual install from the tarball (any platform, including Windows)

            ```bash
            # Download from the asset below, then:
            npm install -g ./opencode-rich-presence-${{ github.ref_name }}.tgz
            opencode-rpc install
            ```

            ### Why not `npm install -g Khip01/opencode-rich-presence#${{ github.ref_name }}`?

            npm v11 has a bug installing global git deps: the install
            appears to succeed (`added 1 package`) but the
            `opencode-rpc` binary is missing. Always install from a
            local tarball. See
            [TROUBLESHOOTING.md](https://github.com/Khip01/opencode-rich-presence/blob/main/docs/TROUBLESHOOTING.md#opencode-rpc-command-not-found-after-install)
            for the full story.

            ### Upgrade

            Once installed, use `opencode-rpc update` to upgrade:

            ```bash
            opencode-rpc update                    # latest stable release tag
            opencode-rpc update --stable           # force install latest stable
            opencode-rpc update --dev <branch>     # latest commit on <branch>
            opencode-rpc update --ref ${{ github.ref_name }}    # install a specific tag, branch, or SHA
            opencode-rpc update --repo <fork>      # install from a fork
            ```

            ## What's in ${{ github.ref_name }}

            See [CHANGELOG.md](https://github.com/Khip01/opencode-rich-presence/blob/main/CHANGELOG.md) for full details.
