name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & publish GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Smoke tests
        run: |
          node bin/opencode-rpc.js help
          node bin/opencode-rpc.js version

      - name: Build tarball
        run: npm pack

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: opencode-rich-presence-*.tgz
          body: |
            ## Installation

            ### Fresh install

            ```bash
            npm install -g https://github.com/Khip01/opencode-rich-presence/releases/download/${{ github.ref_name }}/opencode-rich-presence-${{ github.ref_name }}.tgz
            opencode-rpc install
            ```

            Then add this to `~/.config/opencode/opencode.json` (or `.jsonc`):

            ```json
            {
              "plugin": ["opencode-rich-presence"]
            }
            ```

            ### Update from previous v2.x

            ```bash
            opencode-rpc update
            ```

            Or reinstall manually:
            ```bash
            npm install -g https://github.com/Khip01/opencode-rich-presence/releases/download/${{ github.ref_name }}/opencode-rich-presence-${{ github.ref_name }}.tgz
            ```

            ### Migrating from v1.0.0 (legacy Linux-only)

            v1.0.0 used bash install/uninstall scripts which are no longer included.

            1. Back up your old `~/.config/opencode/discord-config.json` if you have one.
            2. Run the fresh install command above.
            3. Run `opencode-rpc install` to set up the new config file.
            4. Restore your settings into the new config (App ID, presence templates).
            5. Restart OpenCode.

            ## What's in v2.0.4

            ### Fixed

            - `opencode-rpc restart` no longer restarts Discord Desktop. It now only writes the restart signal and kills the worker subprocess, matching the v1.0.0 behavior. Users in voice chat are no longer disrupted just to apply a plugin config change.
            - Cross-platform worker kill uses `pgrep`+`kill` on Linux/macOS and `wmic`+`taskkill` on Windows.
            - CLI entry script wraps execution in an async `main()` function. Eliminates the "Detected unsettled top-level await" warning that Node 22+ emitted for interactive commands.
            - `opencode-rpc info` now reads `~/.config/opencode/opencode.jsonc` files that use JSONC features (line comments, block comments, trailing commas).

            ### Documentation

            - Replaced fabricated example outputs in CLI-REFERENCE and TROUBLESHOOTING with actual outputs captured from a running CLI installation.
            - Section visibility notes added so users know when the "Lock (leader instance)" and "OpenCode plugin registration" sections appear or are absent.
            - README, CLI-REFERENCE, TROUBLESHOOTING, and ARCHITECTURE updated to reflect the new restart behavior.
